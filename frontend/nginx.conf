server {
  listen 80;

  # ── Proxy inverso: enrutar peticiones de API/auth al Gateway ──────────────
  # Permite usar un único túnel Cloudflare apuntando al frontend (puerto 80).
  # Nginx reenvía internamente las rutas al gateway dentro de la red Docker.

  location /api/ {
    proxy_pass         http://gateway:8000;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }

  location /auth/ {
    proxy_pass         http://gateway:8000;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }

  location /health {
    proxy_pass         http://gateway:8000;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
  }

  # ── SPA: cualquier ruta desconocida vuelve a index.html ──────────────────
  # para que el enrutamiento de React funcione.
  location / {
    root   /usr/share/nginx/html;
    index  index.html;
    try_files $uri $uri/ /index.html;
  }
}
