apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: campusconnect
  namespace: campusconnect-dev
spec:
  interval: 1m
  chart:
    spec:
      chart: deploy/helm/campusconnect
      sourceRef:
        kind: GitRepository
        name: campusconnect-repo
        namespace: campusconnect-dev
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  valuesFrom:
    # Lee los valores directamente desde el values.yaml en el repositorio Git
    - kind: ConfigMap
      name: campusconnect-values
      optional: true
