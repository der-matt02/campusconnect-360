name: DevSecOps CI/CD Pipeline

on:
  push:
    branches: [ main, develop, build/devsecops ]
  pull_request:
    branches: [ main, develop, build/devsecops ]

permissions:
  contents: write
  packages: write

jobs:
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff==0.4.4
        pip install -r requirements-dev.txt

    - name: Run style check (Ruff)
      run: ruff check .

    - name: Run tests with coverage
      run: |
        chmod +x scripts/coverage.sh
        PYBIN=python bash scripts/coverage.sh

  gitleaks:
    name: Secret Scanning (GitLeaks)
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Run GitLeaks
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  snyk-scan:
    name: SAST & SCA Scan (Snyk)
    runs-on: ubuntu-latest
    needs: [lint-and-test]
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js (for Snyk CLI)
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Snyk CLI
      uses: snyk/actions/setup@master

    - name: Snyk Auth
      run: snyk auth ${{ secrets.SNYK_TOKEN }}

    - name: Run Snyk Code (SAST)
      run: |
        snyk code test --all-projects > snyk-sast.txt || true
        cat snyk-sast.txt

    - name: Run Snyk Open Source (SCA)
      run: |
        snyk test --all-projects > snyk-sca.txt || true
        cat snyk-sca.txt

    - name: Upload Snyk Reports
      uses: actions/upload-artifact@v4
      with:
        name: snyk-security-reports
        path: |
          snyk-sast.txt
          snyk-sca.txt

  build-and-push:
    name: Build & Scan Container
    runs-on: ubuntu-latest
    needs: [gitleaks, snyk-scan]
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: gateway
            context: .
            dockerfile: gateway/Dockerfile
            image: campusconnect360-gateway
          - name: academico
            context: .
            dockerfile: services/academico/Dockerfile
            image: campusconnect360-academico
          - name: pagos
            context: .
            dockerfile: services/pagos/Dockerfile
            image: campusconnect360-pagos
          - name: asistencia
            context: .
            dockerfile: services/asistencia/Dockerfile
            image: campusconnect360-asistencia
          - name: notificaciones
            context: .
            dockerfile: services/notificaciones/Dockerfile
            image: campusconnect360-notificaciones
          - name: analitica
            context: .
            dockerfile: services/analitica/Dockerfile
            image: campusconnect360-analitica
          - name: frontend
            context: ./frontend
            dockerfile: frontend/Dockerfile
            image: campusconnect360-frontend
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Convert Owner to Lowercase
      id: lowercase_owner
      run: |
        OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
        echo "owner=$OWNER_LC" >> $GITHUB_OUTPUT

    - name: Build and Load Docker Image locally
      uses: docker/build-push-action@v5
      with:
        context: ${{ matrix.service.context }}
        file: ${{ matrix.service.dockerfile }}
        load: true
        tags: |
          ghcr.io/${{ steps.lowercase_owner.outputs.owner }}/${{ matrix.service.image }}:${{ github.sha }}
          ghcr.io/${{ steps.lowercase_owner.outputs.owner }}/${{ matrix.service.image }}:latest

    - name: Run Trivy Scanner (Vulnerabilities)
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ghcr.io/${{ steps.lowercase_owner.outputs.owner }}/${{ matrix.service.image }}:latest
        format: 'table'
        exit-code: '0'
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'
        output: 'trivy-report-${{ matrix.service.name }}.txt'

    - name: Generate SBOM (Trivy CycloneDX)
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ghcr.io/${{ steps.lowercase_owner.outputs.owner }}/${{ matrix.service.image }}:latest
        format: 'cyclonedx'
        output: 'sbom-${{ matrix.service.name }}.json'

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Push Docker Images to GHCR
      run: |
        docker push ghcr.io/${{ steps.lowercase_owner.outputs.owner }}/${{ matrix.service.image }}:${{ github.sha }}
        docker push ghcr.io/${{ steps.lowercase_owner.outputs.owner }}/${{ matrix.service.image }}:latest

    - name: Upload Security & SBOM Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: security-artifacts-${{ matrix.service.name }}
        path: |
          trivy-report-${{ matrix.service.name }}.txt
          sbom-${{ matrix.service.name }}.json

  deploy-gitops:
    name: GitOps Release Deploy
    runs-on: ubuntu-latest
    needs: [build-and-push]
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Update values.yaml image tags
      run: |
        python -c '
        import os, yaml
        values_path = "deploy/helm/campusconnect/values.yaml"
        if not os.path.exists(values_path):
            print("El archivo values.yaml no existe todavía. Se omitirá temporalmente hasta que se cree el Helm chart.")
            exit(0)
        with open(values_path, "r") as f:
            data = yaml.safe_load(f) or {}
        
        sha = os.environ.get("GITHUB_SHA", "latest")
        if "global" in data and "image" in data["global"]:
             data["global"]["image"]["tag"] = sha
        else:
             print("Estructura global.image no encontrada en values.yaml, se actualizará manualmente por servicio.")
             
        with open(values_path, "w") as f:
            yaml.safe_dump(data, f)
        '
      env:
        GITHUB_SHA: ${{ github.sha }}

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add deploy/helm/campusconnect/values.yaml || true
        git commit -m "chore(gitops): update image tags to ${{ github.sha }} [skip ci]" || true
        git push origin build/devsecops || true
