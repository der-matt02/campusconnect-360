# ============================================================
#  CampusConnect 360 — Orquestación del ecosistema completo
# ============================================================
name: campusconnect360

services:
  # ---------- Infraestructura ----------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DB_ACADEMICO: ${DB_ACADEMICO}
      DB_PAGOS: ${DB_PAGOS}
      DB_ASISTENCIA: ${DB_ASISTENCIA}
      DB_NOTIFICACIONES: ${DB_NOTIFICACIONES}
      DB_ANALITICA: ${DB_ANALITICA}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "5672:5672"        # protocolo AMQP
      - "15672:15672"      # panel de administración
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ---------- Frontend (portales + dashboard) ----------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - gateway

  # ---------- API Gateway (entrada centralizada) ----------
  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      academico:
        condition: service_started
      pagos:
        condition: service_started
      asistencia:
        condition: service_started
      notificaciones:
        condition: service_started
      analitica:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\")'"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ---------- Microservicios ----------
  academico:
    build:
      context: .
      dockerfile: services/academico/Dockerfile
    env_file: .env
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8001/health\")'"]
      interval: 10s
      timeout: 5s
      retries: 10

  pagos:
    build:
      context: .
      dockerfile: services/pagos/Dockerfile
    env_file: .env
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8002/health\")'"]
      interval: 10s
      timeout: 5s
      retries: 10

  asistencia:
    build:
      context: .
      dockerfile: services/asistencia/Dockerfile
    env_file: .env
    ports:
      - "8004:8004"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8004/health\")'"]
      interval: 10s
      timeout: 5s
      retries: 10

  notificaciones:
    build:
      context: .
      dockerfile: services/notificaciones/Dockerfile
    env_file: .env
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8003/health\")'"]
      interval: 10s
      timeout: 5s
      retries: 10

  analitica:
    build:
      context: .
      dockerfile: services/analitica/Dockerfile
    env_file: .env
    ports:
      - "8005:8005"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8005/health\")'"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
